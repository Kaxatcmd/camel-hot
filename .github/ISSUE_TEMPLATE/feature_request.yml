name: Feature Request
description: Suggest an idea or improvement for Camel-Hot
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please fill in as much detail as you can.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is your feature request related to a problem? Describe it.
      placeholder: "I'm always frustrated when…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear description of what you want to happen.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which part of the app would this affect?
      options:
        - Analyze tab
        - Organize tab
        - Playlist tab
        - Compatibility tab
        - Camelot Wheel
        - UI / Theme
        - Audio analysis accuracy
        - New analysis feature
        - Performance
        - CLI / scripting
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any mockups, screenshots, or references here.
